# ~/.config/starship.toml
add_newline = true

format = """
$directory$git_branch$git_status$nodejs$python$rust$golang$java$cmd_duration
$character"""

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "red"

[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch(:$remote_branch)](bold purple) "

[git_status]
format = '([\[$all_status$ahead_behind\]](yellow) )'
conflicted = "⚡${count}"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = "≡${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 500
format = "took [$duration](bold yellow) "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[nodejs]
symbol = " "
format = "[$symbol($version )](bold green)"
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[python]
symbol = " "
format = '[$symbol${pyenv_prefix}(${version} )(\($virtualenv\) )](bold yellow)'

[rust]
symbol = " "
format = "[$symbol($version )](bold red)"

[golang]
symbol = " "
format = "[$symbol($version )](bold cyan)"

[java]
symbol = "☕ "
format = "[$symbol($version )](bold red)"
