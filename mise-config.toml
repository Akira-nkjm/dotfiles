# Global mise config — symlinked to ~/.config/mise/config.toml
#
# Per-project mise.toml overrides values here.
#
# 方針: mise で書けるものは全部ここに集約する。
# 例外として uv / rustup は別レイヤーで管理する:
#   - Python interpreter は uv (uv python pin) または プロジェクトの mise.toml
#   - Rust toolchain は rustup + rust-toolchain.toml
# 理由: 各々の self-update が速く、bootstrap が壊れた時の復旧経路を短く保つため。
#
# apt 側に残すのは「システム基盤 / シェル統合ファイルが /usr/share に必要なもの /
# mise を入れる前提のもの」のみ (zsh, fzf integration, curl, git, build-essential 等)。

[tools]
# 言語ランタイム
node = "lts"
go   = "latest"

# Node 系パッケージマネージャ
# プロジェクト固有バージョンは ./mise.toml で上書き。corepack enable はしない。
pnpm = "latest"

# ターミナル UX
starship = "latest"
tmux     = "latest"

# CLI ツール（apt より追随が速い）
gh      = "latest"
ripgrep = "latest"
fd      = "latest"
bat     = "latest"
jq      = "latest"

# 開発ワークフロー
just    = "latest"   # タスクランナー (justfile)
eza     = "latest"   # ls + tree 置き換え (zshrc にエイリアス)
zoxide  = "latest"   # 賢い cd (zshrc で eval `zoxide init zsh`)
delta   = "latest"   # git diff pager (gitconfig で設定)
lazygit = "latest"   # git TUI
yq      = "latest"   # YAML/TOML の jq
typst = "latest"

# Infrastructure as Code / AWS（LocalStack 練習 + 本物の AWS でも使い回す）
terraform = "latest"
aws-cli   = "latest"

# Google Cloud SDK（gcloud / gsutil / bq。専用 python3 同梱なのでシステム Python 非依存）
# 自己更新 (gcloud components update) は version manager 下では無効だが、mise の宣言的
# バージョン管理 (この行を書き換え) で代替できるので aws-cli / terraform と同じ扱いにできる。
# gws auth setup の依存 (OAuth client / GCP project 設定) でもある。
gcloud = "latest"

# Google Workspace CLI（Drive / Gmail / Calendar / Sheets / Docs などを 1 コマンドで）
# mise registry 未登録のため github バックエンドで直接 prebuilt binary を取得 (バイナリ名は gws)。
# 認証情報は ~/.config/gws/ に暗号化保存される機密情報なので repo では管理しない (gh / claude と同様)。
# 初回は `gws auth setup` → `gws auth login` を手動実行する (README の手動ステップ参照。gcloud 必須)。
"github:googleworkspace/cli" = "latest"

# 注: AI CLI (claude / codex) は公式 install script が推奨かつ自己更新するため
# mise ではなく bootstrap.sh で直接導入 (uv / rustup と同じ扱い)。
